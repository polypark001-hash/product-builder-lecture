    <title>Dinner Menu Recommender</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>
        <header>
            <h1>What's for Dinner?</h1>
        </header>
        <main>
            <div class="menu-card">
                <div id="recommendation-container" class="recommendation-container">
                    <p class="placeholder-text">Press the button for a recommendation!</p>
                </div>
                <button id="recommend-btn">Get Recommendation</button>
            </div>

            <div class="contact-card">
                <h2>Partnership Inquiry</h2>
                <form action="https://formspree.io/f/xzdjblgb" method="POST">
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Inquiry</button>
                </form>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
