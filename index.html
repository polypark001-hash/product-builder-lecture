<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Menu Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>
        <header>
            <h1>What's for Dinner?</h1>
        </header>
        <main>
            <div class="menu-card">
                <div id="recommendation-container" class="recommendation-container">
                    <p class="placeholder-text">Press the button for a recommendation!</p>
                </div>
                <button id="recommend-btn">Get Recommendation</button>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
