<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>
        <header>
            <h1>Lotto Number Recommender</h1>
        </header>
        <main>
            <div class="lotto-card">
                <div class="numbers-container" id="numbers-container">
                </div>
                <button id="generate-btn">Generate Numbers</button>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
